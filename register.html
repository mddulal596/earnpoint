<!DOCTYPE html>
<html>
<head>
  <title>Refer | EarnPoint</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<button id="menu-toggle">☰ Menu</button>

<div id="sidebar">
  <a href="dashboard.html">Dashboard</a>
  <a href="tasks.html">Tasks</a>
  <a href="refer.html">Refer</a>
  <a href="withdraw.html">Withdraw</a>
  <a href="profile.html">Profile</a>
  <a href="#" id="logoutBtn">Logout</a>
</div>

<div class="container">
  <h2>Referral System</h2>
  <p id="refLink">Loading...</p>
</div>

<script type="module">
import { auth, db } from './js/firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const logoutBtn = document.getElementById('logoutBtn');
logoutBtn.onclick = () => auth.signOut();

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href='login.html'; return; }
  const userRef = doc(db, 'users', user.uid);
  const userSnap = await getDoc(userRef);
  if (!userSnap.exists()) return;
  
  const data = userSnap.data();
  const refLink = `https://mddulal596.github.io/earnpoint/register.html?ref=${user.uid}`;
  document.getElementById('refLink').innerHTML = `Your Referral Link: <br><input type="text" value="${refLink}" readonly style="width:100%;padding:8px;">`;
});
</script>

</body>
</html>
