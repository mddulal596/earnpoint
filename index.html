<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Rewards - Home</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <header>
        <div class="menu-icon" onclick="toggleSidebar()">☰</div>
        <div class="app-title">PRO REWARDS</div>
        <div class="balance-container">Tk. <span id="userBalance">0.00</span></div>
    </header>

    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleSidebar()">&times;</a>
        <a href="index.html">Home</a>
        <a href="withdraw.html">Withdraw</a>
        <a href="history.html">History</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="privacy.html">Privacy Policy</a>
    </div>

    <main>
        <div class="bonus-section">
            <button id="bonusBtn" class="bonus-btn">Daily Bonus (Tk. 5.00)</button>
        </div>

        <div class="task-grid">
            <div class="task-card" onclick="startTask('Task 01')">
                <i class="fas fa-play-circle"></i>
                <p>Task 01</p>
                <span>Tk. 0.50</span>
            </div>
            <div class="task-card" onclick="startTask('Task 02')">
                <i class="fas fa-play-circle"></i>
                <p>Task 02</p>
                <span>Tk. 0.50</span>
            </div>
            <div class="task-card" onclick="startTask('Task 03')">
                <i class="fas fa-play-circle"></i>
                <p>Task 03</p>
                <span>Tk. 0.50</span>
            </div>
            <div class="task-card" onclick="startTask('Task 04')">
                <i class="fas fa-play-circle"></i>
                <p>Task 04</p>
                <span>Tk. 0.50</span>
            </div>
        </div>
    </main>

    <script type="module" src="js/script.js"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            sidebar.classList.toggle("active");
        }
    </script>
</body>
</html>
