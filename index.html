<!DOCTYPE html>
<html>
<head>
  <title>Dashboard | EarnPoint</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<button id="menu-toggle">☰ Menu</button>

<div id="sidebar">
  <a href="dashboard.html">Dashboard</a>
  <a href="tasks.html">Tasks</a>
  <a href="refer.html">Refer</a>
  <a href="withdraw.html">Withdraw</a>
  <a href="profile.html">Profile</a>
  <a href="#" id="logoutBtn">Logout</a>
</div>

<div class="container">
  <h2>Dashboard</h2>
  <p id="userInfo">Loading...</p>
  <p id="userBalance">Points: 0</p>
  <button id="addPointsBtn">Add 100 Points</button>
</div>

<script>
  const sidebar = document.getElementById('sidebar');
  const toggle = document.getElementById('menu-toggle');
  toggle.onclick = () => sidebar.classList.toggle('active');

  document.getElementById('logoutBtn').onclick = () => alert('Logout clicked (firebase later)');
  document.getElementById('addPointsBtn').onclick = () => alert('Add points clicked (firebase later)');

  document.getElementById('userInfo').innerText = 'Name: John Doe | Email: john@example.com';
  document.getElementById('userBalance').innerText = 'Points: 500';
</script>

</body>
</html>
