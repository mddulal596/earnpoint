<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Rewards - Home</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 10px; color: #1e40af;">Connecting to Server...</p>
    </div>

    <header>
        <div class="header-left">
            <div class="menu-icon" onclick="toggleSidebar()">☰</div>
            <div class="app-title">PRO REWARDS</div>
        </div>
        <div class="header-right">
            <div class="balance-container">Tk. <span id="userBalance">0.00</span></div>
            <div class="profile-icon" onclick="window.location.href='profile.html'">
                <i class="fas fa-user-circle"></i>
                <span id="headerUserName">User</span>
            </div>
        </div>
    </header>

    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleSidebar()">&times;</a>
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="withdraw.html"><i class="fas fa-wallet"></i> Withdraw</a>
        <a href="history.html"><i class="fas fa-history"></i> History</a>
        <a href="leaderboard.html"><i class="fas fa-trophy"></i> Leaderboard</a>
        <a href="privacy.html"><i class="fas fa-lock"></i> Privacy Policy</a>
    </div>

    <main>
        <div class="bonus-section">
            <button id="bonusBtn" class="bonus-btn">Daily Bonus (Tk. 5.00)</button>
        </div>

        <div class="task-grid">
            <div class="task-card" onclick="startTask()">
                <i class="fas fa-play-circle"></i>
                <p>Task 01</p>
                <span>Tk. 0.50</span>
            </div>
            <div class="task-card" onclick="startTask()">
                <i class="fas fa-play-circle"></i>
                <p>Task 02</p>
                <span>Tk. 0.50</span>
            </div>
            <div class="task-card" onclick="startTask()">
                <i class="fas fa-play-circle"></i>
                <p>Task 03</p>
                <span>Tk. 0.50</span>
            </div>
            <div class="task-card" onclick="startTask()">
                <i class="fas fa-play-circle"></i>
                <p>Task 04</p>
                <span>Tk. 0.50</span>
            </div>
        </div>
    </main>

    <script type="module" src="js/script.js"></script>
    <script>
        function toggleSidebar() {
            const sb = document.getElementById("sidebar");
            sb.classList.toggle("active");
        }
    </script>
</body>
</html>
