<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | EarnPoint</title>
<style>
  body { font-family:'Segoe UI',sans-serif; background:#f0f4ff; margin:0; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .container { background:#fff; padding:30px 40px; border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.1); width:100%; max-width:600px; }
  h2 { color:#0000ff; margin-bottom:20px; text-align:center; }
  table { width:100%; border-collapse:collapse; margin-top:20px; }
  th, td { padding:10px; text-align:left; border-bottom:1px solid #ddd; }
  button { padding:6px 12px; border:none; border-radius:5px; cursor:pointer; transition:0.2s; }
  .approve { background:#28a745; color:#fff; }
  .reject { background:#dc3545; color:#fff; }
</style>
</head>
<body>
<div class="container">
  <h2>Admin Panel - Withdraw Requests</h2>
  <table>
    <thead>
      <tr><th>User</th><th>Amount</th><th>Action</th></tr>
    </thead>
    <tbody id="requestsTable"></tbody>
  </table>
</div>

<script type="module">
import { auth, db } from './firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {
  if (!user || user.email !== "mddulalhosen0@gmail.com") {
    alert("Access denied");
    window.location.href = "login.html";
    return;
  }

  const requestsRef = collection(db, "withdrawRequests");
  const snapshot = await getDocs(requestsRef);
  const table = document.getElementById("requestsTable");

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${data.userEmail}</td>
      <td>৳ ${data.amount}</td>
      <td>
        <button class="approve">Approve</button>
        <button class="reject">Reject</button>
      </td>
    `;
    table.appendChild(row);

    row.querySelector(".approve").addEventListener("click", async () => {
      await updateDoc(doc(db, "withdrawRequests", docSnap.id), { status: "approved" });
      row.style.backgroundColor = "#d4edda";
    });

    row.querySelector(".reject").addEventListener("click", async () => {
      await updateDoc(doc(db, "withdrawRequests", docSnap.id), { status: "rejected" });
      row.style.backgroundColor = "#f8d7da";
    });
  });
});
</script>
</body>
</html>
