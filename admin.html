<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel | EarnPoint</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <h2>Admin Panel</h2>
  <div id="pendingWithdraws"></div>
</div>

<script type="module">
import { auth, db } from './js/firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {
  if (!user || user.email !== 'mddulalhosen0@gmail.com') { alert('Admin only'); window.location.href='login.html'; return; }

  const withdrawsCol = collection(db, 'withdrawRequests');
  const withdrawsSnap = await getDocs(withdrawsCol);

  const container = document.getElementById('pendingWithdraws');
  withdrawsSnap.forEach(w => {
    const data = w.data();
    const div = document.createElement('div');
    div.classList.add('task-card');
    div.innerHTML = `
      <span>${data.userId} | ${data.points} Points | ${data.method} | ${data.number} | Status: ${data.status}</span>
      <button id="approve-${w.id}">Approve</button>
      <button id="reject-${w.id}">Reject</button>
    `;
    container.appendChild(div);

    document.getElementById(`approve-${w.id}`).onclick = async () => {
      await updateDoc(doc(db, 'withdrawRequests', w.id), { status: 'paid' });
      alert('Withdraw approved');
      div.remove();
    }
    document.getElementById(`reject-${w.id}`).onclick = async () => {
      await updateDoc(doc(db, 'withdrawRequests', w.id), { status: 'rejected' });
      alert('Withdraw rejected');
      div.remove();
    }
  });
});
</script>

</body>
</html>
