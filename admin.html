<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <h2>Admin Panel</h2>
  <div id="adminContent">Loading...</div>
</div>

<script type="module">
import { auth, db } from './js/firebase.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const adminEmail = "mddulalhosen0@gmail.com";

onAuthStateChanged(auth, async user=>{
  if(!user) return window.location.href="index.html";
  if(user.email !== adminEmail) return alert("Not authorized");
  const usersSnap = await getDocs(collection(db,"users"));
  let html = "<h3>Users List</h3>";
  usersSnap.forEach(u=>{
    const data = u.data();
    html += `<p>${data.email} - Points: ${data.points || 0}</p>`;
  });
  document.getElementById("adminContent").innerHTML = html;
});
</script>

</body>
</html>
