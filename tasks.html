<!DOCTYPE html>
<html>
<head>
  <title>Tasks | EarnPoint</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<button id="menu-toggle">☰ Menu</button>

<div id="sidebar">
  <a href="dashboard.html">Dashboard</a>
  <a href="tasks.html">Tasks</a>
  <a href="refer.html">Refer</a>
  <a href="withdraw.html">Withdraw</a>
  <a href="profile.html">Profile</a>
  <a href="#" id="logoutBtn">Logout</a>
</div>

<div class="container">
  <h2>Tasks</h2>
  <div class="task-card">
    <span>Watch Video (30 sec) - Reward: 100 Points</span>
    <button id="task1Btn">Start</button>
  </div>
  <div class="task-card">
    <span>Sponsor Visit (20 sec) - Reward: 50 Points</span>
    <button id="task2Btn">Start</button>
  </div>
  <div class="task-card">
    <span>Daily Bonus (1x/day) - Reward: 200 Points</span>
    <button id="dailyBonusBtn">Claim</button>
  </div>
</div>

<script type="module">
import { auth, db } from './js/firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const task1Btn = document.getElementById('task1Btn');
const task2Btn = document.getElementById('task2Btn');
const dailyBonusBtn = document.getElementById('dailyBonusBtn');
const logoutBtn = document.getElementById('logoutBtn');

logoutBtn.onclick = () => auth.signOut();

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href='login.html'; return; }
  
  const userRef = doc(db, 'users', user.uid);
  const userSnap = await getDoc(userRef);
  if (!userSnap.exists()) return;

  let userData = userSnap.data();

  const checkDailyLimit = (reward) => {
    const today = new Date().toDateString();
    if (userData.lastEarnDate !== today) { userData.dailyEarn = 0; userData.lastEarnDate = today; }
    if ((userData.dailyEarn + reward) > 500) {
      alert('Daily limit reached!');
      return false;
    }
    return true;
  }

  const updatePoints = async (reward) => {
    userData.points += reward;
    userData.dailyEarn += reward;
    await updateDoc(userRef, { points: userData.points, dailyEarn: userData.dailyEarn, lastEarnDate: userData.lastEarnDate });
    alert(`You earned ${reward} Points! Current Points: ${userData.points}`);
  }

  task1Btn.onclick = () => {
    if (!checkDailyLimit(100)) return;
    task1Btn.disabled = true;
    task1Btn.innerText = 'Watching...';
    setTimeout(async () => { task1Btn.disabled = false; task1Btn.innerText = 'Start'; await updatePoints(100); }, 30000);
  }

  task2Btn.onclick = () => {
    if (!checkDailyLimit(50)) return;
    task2Btn.disabled = true;
    task2Btn.innerText = 'Visiting...';
    setTimeout(async () => { task2Btn.disabled = false; task2Btn.innerText = 'Start'; await updatePoints(50); }, 20000);
  }

  dailyBonusBtn.onclick = async () => {
    const today = new Date().toDateString();
    if (userData.lastBonus === today) { alert('Daily bonus already claimed!'); return; }
    if (!checkDailyLimit(200)) return;
    userData.lastBonus = today;
    await updatePoints(200);
  }

});
</script>

</body>
</html>
