<!DOCTYPE html>
<html>
<head>
  <title>Dashboard | EarnPoint</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<button id="menu-toggle">☰ Menu</button>

<div id="sidebar">
  <a href="dashboard.html">Dashboard</a>
  <a href="tasks.html">Tasks</a>
  <a href="refer.html">Refer</a>
  <a href="withdraw.html">Withdraw</a>
  <a href="profile.html">Profile</a>
  <a href="#" id="logoutBtn">Logout</a>
</div>

<div class="container">
  <h2>Dashboard</h2>
  <p id="userInfo">Loading...</p>
  <p id="userBalance">Points: 0</p>
  <button id="addPointsBtn">Add 100 Points</button>
</div>

<script type="module">
import { auth, db } from './js/firebase.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const sidebar = document.getElementById('sidebar');
const toggle = document.getElementById('menu-toggle');
toggle.onclick = () => sidebar.classList.toggle('active');

const logoutBtn = document.getElementById('logoutBtn');
logoutBtn.onclick = () => signOut(auth);

const userInfo = document.getElementById('userInfo');
const userBalance = document.getElementById('userBalance');
const addPointsBtn = document.getElementById('addPointsBtn');

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const docRef = doc(db, 'users', user.uid);
    const docSnap = await getDoc(docRef);
    if (docSnap.exists()) {
      const data = docSnap.data();
      userInfo.innerText = `Name: ${data.name || 'N/A'} | Email: ${data.email}`;
      userBalance.innerText = `Points: ${data.points}`;
      addPointsBtn.onclick = async () => {
        const newPoints = (data.points || 0) + 100;
        await updateDoc(docRef, { points: newPoints });
        userBalance.innerText = `Points: ${newPoints}`;
      };
    }
  } else {
    window.location.href = 'login.html';
  }
});
</script>

</body>
</html>
