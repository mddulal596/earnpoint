<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | EarnPoint</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; margin:0; display:flex; justify-content:center; align-items:center; min-height:100vh;}
  .container { background: #fff; padding: 30px 40px; border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.1); width:100%; max-width:400px; text-align:center;}
  h2 { color: #0000ff; margin-bottom:20px;}
  p { font-size:16px; margin:10px 0;}
  button { padding:12px 20px; margin:10px 5px; border:none; border-radius:8px; cursor:pointer; font-size:16px; transition:0.2s;}
  #logoutBtn { background:#ff4d4d; color:#fff;}
  #addPointsBtn { background:#0000ff; color:#fff;}
  button:hover { opacity:0.9;}
</style>
</head>
<body>

<div class="container">
  <h2>Dashboard</h2>
  <p id="userInfo">Loading...</p>
  <p id="userBalance">Balance: ৳ 0</p>
  <button id="addPointsBtn">Add 100 Points</button>
  <button id="logoutBtn">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCocTCNbmDj8b5fOrh5g7W_0YghJ8n9niE",
  authDomain: "earnpoint-76792.firebaseapp.com",
  projectId: "earnpoint-76792",
  appId: "1:88961998597:web:1cf6237d002b5eedb9a16c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUserDoc = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const docRef = doc(db, "users", user.uid);
  let docSnap = await getDoc(docRef);

  if (!docSnap.exists()) {
    await setDoc(docRef, {
      name: user.email.split("@")[0],
      email: user.email,
      role: "user",
      balance: 0,
      createdAt: new Date()
    });
    docSnap = await getDoc(docRef);
  }

  const data = docSnap.data();
  currentUserDoc = docRef;
  document.getElementById("userInfo").innerText = `Name: ${data.name} | Email: ${data.email}`;
  document.getElementById("userBalance").innerText = `Balance: ৳ ${data.balance}`;
});

document.getElementById("addPointsBtn").addEventListener("click", async () => {
  if (!currentUserDoc) return;
  const docSnap = await getDoc(currentUserDoc);
  const data = docSnap.data();
  const newBalance = data.balance + 100;
  await updateDoc(currentUserDoc, { balance: newBalance });
  document.getElementById("userBalance").innerText = `Balance: ৳ ${newBalance}`;
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
});
</script>

</body>
</html>
