<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Processing</title>
    <style>
        body { background: #ff0000; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial; }
        .timer-box { font-size: 3rem; font-weight: bold; background: #1e40af; padding: 30px; border-radius: 50%; border: 5px solid white; margin: 20px; }
    </style>
</head>
<body>
    <h2>Please Wait...</h2>
    <div class="timer-box" id="timer">19</div>
    <p>Watching Ad... Do not close!</p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCocTCNbmDj8b5fOrh5g7W_0YghJ8n9niE",
            authDomain: "earnpoint-76792.firebaseapp.com",
            databaseURL: "https://earnpoint-76792-default-rtdb.firebaseio.com",
            projectId: "earnpoint-76792",
            storageBucket: "earnpoint-76792.firebasestorage.app",
            messagingSenderId: "88961998597",
            appId: "1:88961998597:web:1cf6237d002b5eedb9a16c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let time = 19;
        const timerLabel = document.getElementById('timer');

        const interval = setInterval(() => {
            time--;
            timerLabel.innerText = time;
            if (time <= 0) {
                clearInterval(interval);
                const user = auth.currentUser;
                if (user) {
                    const userRef = ref(db, 'users/' + user.uid);
                    get(userRef).then(snap => {
                        update(userRef, { balance: snap.val().balance + 0.50 })
                        .then(() => window.location.href = "index.html");
                    });
                }
            }
        }, 1000);
    </script>
</body>
</html>
